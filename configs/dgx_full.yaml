# ═══════════════════════════════════════════════════════════
# METIS DGX Full — 72B Production Configuration
# Target: DGX Spark (128GB VRAM)
# ═══════════════════════════════════════════════════════════

# Model
model_name: "Qwen/Qwen2.5-72B-Instruct"
device: "auto"

# Generation
n_samples_per_prompt: 32
max_new_tokens: 2048
temperature: 0.7

# Training (DPO)
dpo_epochs: 5
dpo_learning_rate: 1.0e-6
dpo_batch_size: 16
dpo_beta: 0.1
dpo_max_length: 4096
dpo_gradient_accumulation: 2
gradient_checkpointing: false    # 128GB VRAM — no need

# LoRA
lora_r: 128
lora_alpha: 256
lora_dropout: 0.05

# Prompts
n_train_prompts: 500
n_eval_prompts: 100

# Evaluation
eval_max_tokens: 2048
eval_temperature: 0.7

# External Benchmarks
run_benchmarks: true
truthfulqa_questions: 400
mmlu_subjects: 20
mmlu_per_subject: 50
